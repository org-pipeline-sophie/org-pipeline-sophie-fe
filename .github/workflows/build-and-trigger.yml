name: FE - Build with BE Artifact and Trigger Docs

on:
  workflow_dispatch:
      inputs:
            be_run_id:
                    description: 'BE workflow run ID'
                            required: true
                                  be_sha:
                                          description: 'BE commit SHA'
                                                  required: true

                                                  jobs:
                                                    build:
                                                        runs-on: ubuntu-latest

                                                            steps:
                                                                  - name: Checkout FE code
                                                                          uses: actions/checkout@v4

                                                                                - name: Download BE artifact
                                                                                        uses: actions/github-script@v7
                                                                                                with:
                                                                                                          github-token: ${{ secrets.ORG_PAT }}
                                                                                                                    script: |
                                                                                                                                const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                                                                                                                                              owner: 'org-pipeline-sophie',
                                                                                                                                                            repo: 'org-pipeline-sophie-be',
                                                                                                                                                                          run_id: ${{ inputs.be_run_id }}
                                                                                                                                                                                      });
                                                                                                                                                                                      
                                                                                                                                                                                                  const beArtifact = artifacts.data.artifacts.find(a => a.name === 'be-artifact');
                                                                                                                                                                                                              if (!beArtifact) throw new Error('be-artifact not found');
                                                                                                                                                                                                              
                                                                                                                                                                                                                          const download = await github.rest.actions.downloadArtifact({
                                                                                                                                                                                                                                        owner: 'org-pipeline-sophie',
                                                                                                                                                                                                                                                      repo: 'org-pipeline-sophie-be',
                                                                                                                                                                                                                                                                    artifact_id: beArtifact.id,
                                                                                                                                                                                                                                                                                  archive_format: 'zip'
                                                                                                                                                                                                                                                                                              });
                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                          const fs = require('fs');
                                                                                                                                                                                                                                                                                                                      fs.writeFileSync('be-artifact.zip', Buffer.from(download.data));
                                                                                                                                                                                                                                                                                                                                  console.log('BE artifact downloaded!');
                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                        - name: Extract BE artifact
                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                          unzip be-artifact.zip -d be-dist/
                                                                                                                                                                                                                                                                                                                                                                    echo "=== BE Build Info ==="
                                                                                                                                                                                                                                                                                                                                                                              cat be-dist/build-info.txt
                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                    - name: Build frontend
                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                      echo "=== Building Frontend ==="
                                                                                                                                                                                                                                                                                                                                                                                                                mkdir -p fe-dist
                                                                                                                                                                                                                                                                                                                                                                                                                          cp be-dist/build-info.txt fe-dist/be-build-info.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "fe_build_version=${{ github.sha }}" > fe-dist/fe-build-info.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "be_sha=${{ inputs.be_sha }}" >> fe-dist/fe-build-info.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> fe-dist/fe-build-info.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "FE build complete!"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Upload FE artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  name: fe-artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            path: fe-dist/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      retention-days: 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Trigger Docs workflow
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              curl -X POST \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          -H "Authorization: Bearer ${{ secrets.ORG_PAT }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      -H "Accept: application/vnd.github+json" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-docs/actions/workflows/deploy-docs.yml/dispatches \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              -d "{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            \"ref\": \"main\",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          \"inputs\": {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          \"fe_run_id\": \"${{ github.run_id }}\",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          \"be_sha\": \"${{ inputs.be_sha }}\",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          \"fe_sha\": \"${{ github.sha }}\"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "Docs workflow triggered!"
