name: "4. FE - Build with BE Artifact + Docs Plan → Send Result to BE"

on:
  workflow_dispatch:
      inputs:
            be_run_id:
                    description: "BE workflow run ID"
                            required: true
                                  docs_run_id:
                                          description: "DOCS workflow run ID"
                                                  required: true
                                                        jira_issue_key:
                                                                description: "JIRA Issue Key"
                                                                        required: true
                                                                              github_issue_number:
                                                                                      description: "GitHub Issue Number in BE repo"
                                                                                              required: true

                                                                                              jobs:
                                                                                                build-and-send-to-be:
                                                                                                    runs-on: ubuntu-latest
                                                                                                    
                                                                                                        steps:
                                                                                                              - name: Checkout FE code
                                                                                                                      uses: actions/checkout@v4
                                                                                                                      
                                                                                                                            # ── Step 1: BE artifact 다운로드 ───────────────────────────────────
                                                                                                                                  - name: Download BE artifact
                                                                                                                                          uses: actions/github-script@v7
                                                                                                                                                  with:
                                                                                                                                                            github-token: ${{ secrets.ORG_PAT }}
                                                                                                                                                                      script: |
                                                                                                                                                                                  const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                                                                                                                                                                                                owner: 'org-pipeline-sophie',
                                                                                                                                                                                                              repo: 'org-pipeline-sophie-be',
                                                                                                                                                                                                                            run_id: ${{ inputs.be_run_id }}
                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                    const beArtifact = artifacts.data.artifacts.find(a => a.name === 'be-artifact');
                                                                                                                                                                                                                                                                if (!beArtifact) throw new Error('be-artifact not found');
                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                            const download = await github.rest.actions.downloadArtifact({
                                                                                                                                                                                                                                                                                          owner: 'org-pipeline-sophie',
                                                                                                                                                                                                                                                                                                        repo: 'org-pipeline-sophie-be',
                                                                                                                                                                                                                                                                                                                      artifact_id: beArtifact.id,
                                                                                                                                                                                                                                                                                                                                    archive_format: 'zip'
                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                            const fs = require('fs');
                                                                                                                                                                                                                                                                                                                                                                        fs.writeFileSync('be-artifact.zip', Buffer.from(download.data));
                                                                                                                                                                                                                                                                                                                                                                                    console.log('BE artifact downloaded!');
                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                          # ── Step 2: DOCS plan artifact 다운로드 ───────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                - name: Download Docs plan artifact
                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                          github-token: ${{ secrets.ORG_PAT }}
                                                                                                                                                                                                                                                                                                                                                                                                                                    script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                                                                                                                                                                                                                                                                                                                                                                                                                                                              owner: 'org-pipeline-sophie',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            repo: 'org-pipeline-sophie-docs',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run_id: ${{ inputs.docs_run_id }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const docsArtifact = artifacts.data.artifacts.find(a => a.name === 'docs-plan-artifact');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if (!docsArtifact) throw new Error('docs-plan-artifact not found');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const download = await github.rest.actions.downloadArtifact({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        owner: 'org-pipeline-sophie',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      repo: 'org-pipeline-sophie-docs',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    artifact_id: docsArtifact.id,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  archive_format: 'zip'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const fs = require('fs');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      fs.writeFileSync('docs-plan.zip', Buffer.from(download.data));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  console.log('Docs plan artifact downloaded!');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Extract artifacts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          unzip be-artifact.zip -d be-dist/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    unzip docs-plan.zip -d docs-plan/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "=== BE Context ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        cat be-dist/pipeline-context.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "=== Docs Plan ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      cat docs-plan/fe-development-plan.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # ── Step 3: FE 빌드 (BE artifact + Docs plan 기반) ────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Build FE with context
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "=== Building FE ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              mkdir -p fe-dist
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # BE context와 Docs plan을 활용한 FE 빌드
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  cp be-dist/pipeline-context.json fe-dist/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            cp docs-plan/fe-development-plan.md fe-dist/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      cp docs-plan/plan-meta.json fe-dist/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cat <<EOF > fe-dist/fe-summary.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      "jira_issue_key": "${{ inputs.jira_issue_key }}",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  "github_issue_number": "${{ inputs.github_issue_number }}",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              "fe_sha": "${{ github.sha }}",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          "fe_run_id": "${{ github.run_id }}",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      "be_run_id": "${{ inputs.be_run_id }}",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  "docs_run_id": "${{ inputs.docs_run_id }}",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          "status": "success"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              EOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "=== FE Build Complete ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  cat fe-dist/fe-summary.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Upload FE final artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  name: fe-final-artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            path: fe-dist/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      retention-days: 7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # ── Step 4: BE에 최종 결과 전달 ───────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Trigger BE receive-result workflow
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    curl -s -X POST \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -H "Authorization: Bearer ${{ secrets.ORG_PAT }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            -H "Accept: application/vnd.github+json" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-be/actions/workflows/receive-fe-result.yml/dispatches \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    -d "{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  \"ref\": \"main\",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                \"inputs\": {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                \"fe_run_id\": \"${{ github.run_id }}\",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                \"jira_issue_key\": \"${{ inputs.jira_issue_key }}\",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                \"github_issue_number\": \"${{ inputs.github_issue_number }}\",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                \"fe_sha\": \"${{ github.sha }}\"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "BE receive-result workflow triggered! Pipeline complete!"
