name: FE - Build with BE Artifact and Docs Plan and Send Result to BE

on:
  workflow_dispatch:
    inputs:
      be_run_id:
        description: 'BE workflow run ID'
        required: true
      docs_run_id:
        description: 'DOCS workflow run ID'
        required: true
      jira_issue_key:
        description: 'JIRA Issue Key'
        required: true
      github_issue_number:
        description: 'GitHub Issue Number'
        required: true

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FE repo
        uses: actions/checkout@v4

      - name: Download BE artifact
        uses: actions/download-artifact@v4
        with:
          name: be-artifact
          path: be-artifact/
          github-token: ${{ secrets.ORG_PAT }}
          repository: org-pipeline-sophie/org-pipeline-sophie-be
          run-id: ${{ inputs.be_run_id }}

      - name: Download DOCS artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-plan-artifact
          path: docs-plan/
          github-token: ${{ secrets.ORG_PAT }}
          repository: org-pipeline-sophie/org-pipeline-sophie-docs
          run-id: ${{ inputs.docs_run_id }}

      - name: Read artifacts
        run: |
          echo "=== BE Artifact ==="
          cat be-artifact/pipeline-context.json
          echo "=== DOCS Plan ==="
          cat docs-plan/plan-meta.json

      - name: Generate FE code with Claude
        id: claude_fe
        run: |
          PLAN=$(cat docs-plan/plan-meta.json)
          CONTEXT=$(cat be-artifact/pipeline-context.json)

          RESPONSE=$(curl -s -X POST https://api.anthropic.com/v1/messages \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "{
              \"model\": \"claude-3-5-sonnet-20241022\",
              \"max_tokens\": 4096,
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"다음 개발 계획을 기반으로 React FE 컴포넌트 코드를 생성해줘.\\n\\n개발 계획: $PLAN\\n컨텍스트: $CONTEXT\\n\\n반드시 아래 JSON 형식으로만 응답해줘:\\n{\\n  \\\"files\\\": [\\n    {\\n      \\\"path\\\": \\\"src/components/ComponentName.tsx\\\",\\n      \\\"content\\\": \\\"// 실제 코드\\\"\\n    }\\n  ],\\n  \\\"summary\\\": \\\"생성된 코드 요약\\\"\\n}\"
              }]
            }")

          echo "Claude Response received"
          RESULT=$(echo $RESPONSE | jq -r '.content[0].text')
          echo "fe_summary=$(echo $RESULT | jq -r '.summary')" >> $GITHUB_OUTPUT

          # Write generated files
          echo $RESULT | jq -r '.files[] | .path + "|||" + .content' | while IFS='|||' read -r path content; do
            mkdir -p $(dirname $path)
            echo "$content" > $path
            echo "Created: $path"
          done

      - name: Create branch and PR
        run: |
          BRANCH="feature/${{ inputs.jira_issue_key }}-fe-$(date +%s)"
          git config user.email "pipeline@github.com"
          git config user.name "Pipeline Bot"
          git checkout -b $BRANCH
          git add -A
          git diff --staged --quiet || git commit -m "[FE] ${{ inputs.jira_issue_key }}: Claude generated FE code"
          git push origin $BRANCH

          PR_URL=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-fe/pulls \
            -d "{
              \"title\": \"[FE] ${{ inputs.jira_issue_key }}: Auto-generated FE code\",
              \"body\": \"## Claude가 자동 생성한 FE 코드\\n\\n**JIRA:** ${{ inputs.jira_issue_key }}\\n**GitHub Issue:** #${{ inputs.github_issue_number }}\\n\\n### 생성 요약\\n${{ steps.claude_fe.outputs.fe_summary }}\",
              \"head\": \"$BRANCH\",
              \"base\": \"main\"
            }" | jq -r '.html_url')
          echo "PR created: $PR_URL"
          echo "pr_url=$PR_URL" >> $GITHUB_ENV

      - name: Create FE build result artifact
        run: |
          mkdir -p fe-result
          cat > fe-result/fe-summary.json << JSONEOF
          {
            "jira_issue_key": "${{ inputs.jira_issue_key }}",
            "github_issue_number": "${{ inputs.github_issue_number }}",
            "be_run_id": "${{ inputs.be_run_id }}",
            "docs_run_id": "${{ inputs.docs_run_id }}",
            "fe_run_id": "${{ github.run_id }}",
            "fe_sha": "${{ github.sha }}",
            "status": "success",
            "fe_summary": "${{ steps.claude_fe.outputs.fe_summary }}",
            "pr_url": "${{ env.pr_url }}"
          }
          JSONEOF
          cat fe-result/fe-summary.json

      - name: Upload FE artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-final-artifact
          path: fe-result/

      - name: Trigger BE receive-result workflow
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-be/actions/workflows/receive-fe-result.yml/dispatches \
            -d '{
              "ref": "main",
              "inputs": {
                "fe_run_id": "${{ github.run_id }}",
                "jira_issue_key": "${{ inputs.jira_issue_key }}",
                "github_issue_number": "${{ inputs.github_issue_number }}",
                "fe_sha": "${{ github.sha }}"
              }
            }')
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "Failed to trigger BE receive-result workflow"
            exit 1
          fi
          echo "Successfully triggered BE receive-fe-result workflow"
