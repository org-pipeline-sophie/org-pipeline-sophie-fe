name: FE - Build with BE Artifact and Docs Plan and Send Result to BE

on:
  workflow_dispatch:
    inputs:
      be_run_id:
        description: 'BE workflow run ID'
        required: true
      docs_run_id:
        description: 'DOCS workflow run ID'
        required: true
      jira_issue_key:
        description: 'JIRA Issue Key'
        required: true
      github_issue_number:
        description: 'GitHub Issue Number'
        required: true

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FE repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_PAT }}

      - name: Download BE artifact
        uses: actions/download-artifact@v4
        with:
          name: be-artifact
          path: be-artifact/
          github-token: ${{ secrets.ORG_PAT }}
          repository: org-pipeline-sophie/org-pipeline-sophie-be
          run-id: ${{ inputs.be_run_id }}

      - name: Download DOCS artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-plan-artifact
          path: docs-plan/
          github-token: ${{ secrets.ORG_PAT }}
          repository: org-pipeline-sophie/org-pipeline-sophie-docs
          run-id: ${{ inputs.docs_run_id }}

      - name: Read artifacts
        run: |
          cat be-artifact/pipeline-context.json
          cat docs-plan/plan-meta.json

      - name: Generate FE code with Claude
        id: claude_fe
        run: |
          SUMMARY=$(cat docs-plan/plan-meta.json | jq -r '.jira_summary // "FE development"')
          JIRA_KEY="${{ inputs.jira_issue_key }}"
          PROMPT="JIRA: ${JIRA_KEY} - ${SUMMARY}. Generate React TypeScript. Reply ONLY with JSON: {\"files\":[{\"path\":\"src/components/App.tsx\",\"content\":\"import React from 'react'; export default function App() { return <div>App</div>; }\"}],\"summary\":\"summary\"}"
          RESPONSE=$(curl -s -X POST https://api.anthropic.com/v1/messages \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "{\"model\":\"claude-3-5-sonnet-20241022\",\"max_tokens\":2048,\"messages\":[{\"role\":\"user\",\"content\":\"${PROMPT}\"}]}")
          echo "Claude response received"
          TEXT=$(echo "$RESPONSE" | jq -r '.content[0].text')
          echo "Claude text preview: ${TEXT:0:200}"
          FE_SUMMARY=$(echo "$TEXT" | jq -r '.summary // "Claude generated FE code"' 2>/dev/null || echo "Claude generated FE code")
          echo "fe_summary=$FE_SUMMARY" >> $GITHUB_OUTPUT
          mkdir -p src/components
          FILE_COUNT=$(echo "$TEXT" | jq '.files | length' 2>/dev/null || echo "0")
          if [ "$FILE_COUNT" -gt "0" ]; then
            for i in $(seq 0 $((FILE_COUNT - 1))); do
              FILE_PATH=$(echo "$TEXT" | jq -r ".files[$i].path")
              FILE_CONTENT=$(echo "$TEXT" | jq -r ".files[$i].content")
              mkdir -p $(dirname "$FILE_PATH")
              printf '%s' "$FILE_CONTENT" > "$FILE_PATH"
              echo "Created: $FILE_PATH"
            done
          else
            echo "// Claude generated - ${SUMMARY}" > src/components/App.tsx
          fi

      - name: Create branch and PR
        run: |
          BRANCH="feature/${{ inputs.jira_issue_key }}-fe-$(date +%s)"
          git config user.email "pipeline@github.com"
          git config user.name "Pipeline Bot"
          git remote set-url origin https://x-access-token:${{ secrets.ORG_PAT }}@github.com/org-pipeline-sophie/org-pipeline-sophie-fe.git
          git checkout -b $BRANCH
          git add src/
          git commit -m "[FE] ${{ inputs.jira_issue_key }}: Claude generated FE code"
          git push origin $BRANCH
          echo "branch=$BRANCH" >> $GITHUB_ENV
          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-fe/pulls \
            -d "{\"title\":\"[FE] ${{ inputs.jira_issue_key }}: Auto-generated FE code\",\"body\":\"Claude generated. Issue: #${{ inputs.github_issue_number }}\",\"head\":\"$BRANCH\",\"base\":\"main\"}")
          PR_URL=$(echo "$PR_RESPONSE" | jq -r '.html_url // "PR creation failed"')
          echo "PR URL: $PR_URL"
          echo "pr_url=$PR_URL" >> $GITHUB_ENV

      - name: Create FE build result artifact
        run: |
          mkdir -p fe-result
          jq -n \
            --arg jira "${{ inputs.jira_issue_key }}" \
            --arg issue "${{ inputs.github_issue_number }}" \
            --arg be_run "${{ inputs.be_run_id }}" \
            --arg docs_run "${{ inputs.docs_run_id }}" \
            --arg fe_run "${{ github.run_id }}" \
            --arg fe_sha "${{ github.sha }}" \
            --arg summary "${{ steps.claude_fe.outputs.fe_summary }}" \
            --arg pr_url "${{ env.pr_url }}" \
            --arg branch "${{ env.branch }}" \
            '{"jira_issue_key":$jira,"github_issue_number":$issue,"be_run_id":$be_run,"docs_run_id":$docs_run,"fe_run_id":$fe_run,"fe_sha":$fe_sha,"status":"success","fe_summary":$summary,"pr_url":$pr_url,"branch":$branch}' \
            > fe-result/fe-summary.json
          cat fe-result/fe-summary.json

      - name: Upload FE artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-final-artifact
          path: fe-result/

      - name: Trigger BE receive-result workflow
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-be/actions/workflows/receive-fe-result.yml/dispatches \
            -d '{"ref":"main","inputs":{"fe_run_id":"${{ github.run_id }}","jira_issue_key":"${{ inputs.jira_issue_key }}","github_issue_number":"${{ inputs.github_issue_number }}","fe_sha":"${{ github.sha }}"}}')
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "Failed to trigger BE receive-result workflow"
            exit 1
          fi
          echo "Successfully triggered BE receive-fe-result workflow"
