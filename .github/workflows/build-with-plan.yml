name: FE - Build with BE Artifact and Docs Plan and Send Result to BE

on:
  workflow_dispatch:
    inputs:
      be_run_id:
        description: 'BE workflow run ID'
        required: true
      docs_run_id:
        description: 'DOCS workflow run ID'
        required: true
      jira_issue_key:
        description: 'JIRA Issue Key'
        required: true
      github_issue_number:
        description: 'GitHub Issue Number'
        required: true

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FE repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_PAT }}

      - name: Download BE artifact
        uses: actions/download-artifact@v4
        with:
          name: be-artifact
          path: be-artifact/
          github-token: ${{ secrets.ORG_PAT }}
          repository: org-pipeline-sophie/org-pipeline-sophie-be
          run-id: ${{ inputs.be_run_id }}

      - name: Download DOCS artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-plan-artifact
          path: docs-plan/
          github-token: ${{ secrets.ORG_PAT }}
          repository: org-pipeline-sophie/org-pipeline-sophie-docs
          run-id: ${{ inputs.docs_run_id }}

      - name: Generate FE code with Claude and create PR
        id: claude_fe
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ORG_PAT: ${{ secrets.ORG_PAT }}
          JIRA_KEY: ${{ inputs.jira_issue_key }}
          ISSUE_NUMBER: ${{ inputs.github_issue_number }}
          BE_RUN_ID: ${{ inputs.be_run_id }}
          DOCS_RUN_ID: ${{ inputs.docs_run_id }}
        with:
          github-token: ${{ secrets.ORG_PAT }}
          script: |
            const fs = require('fs');
            const https = require('https');
            const path = require('path');
            const { execSync } = require('child_process');

            // Read artifacts
            const plan = JSON.parse(fs.readFileSync('docs-plan/plan-meta.json', 'utf8'));
            const context = JSON.parse(fs.readFileSync('be-artifact/pipeline-context.json', 'utf8'));

            const jiraKey = process.env.JIRA_KEY;
            const apiKey = process.env.ANTHROPIC_API_KEY;
            const orgPat = process.env.ORG_PAT;

            // Call Claude API
            const prompt = `JIRA: ${jiraKey} - ${plan.jira_summary || 'FE development'}. FE tasks: ${JSON.stringify(plan.claude_plan?.fe_tasks || [])}. Generate React TypeScript components. Reply ONLY with JSON (no markdown): {"files":[{"path":"src/components/App.tsx","content":"// code here"}],"summary":"summary here"}`;

            const claudeResponse = await new Promise((resolve, reject) => {
              const data = JSON.stringify({
                model: 'claude-3-5-sonnet-20241022',
                max_tokens: 2048,
                messages: [{ role: 'user', content: prompt }]
              });
              const req = https.request({
                hostname: 'api.anthropic.com',
                path: '/v1/messages',
                method: 'POST',
                headers: {
                  'x-api-key': apiKey,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json',
                  'content-length': Buffer.byteLength(data)
                }
              }, (res) => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => resolve(JSON.parse(body)));
              });
              req.on('error', reject);
              req.write(data);
              req.end();
            });

            const text = claudeResponse.content?.[0]?.text || '{}';
            console.log('Claude response preview:', text.substring(0, 300));

            let fileData;
            try {
              fileData = JSON.parse(text);
            } catch (e) {
              const match = text.match(/\{[\s\S]*\}/);
              fileData = match ? JSON.parse(match[0]) : { files: [], summary: 'parse error' };
            }

            // Write generated files
            for (const file of (fileData.files || [])) {
              const dir = path.dirname(file.path);
              if (dir) fs.mkdirSync(dir, { recursive: true });
              fs.writeFileSync(file.path, file.content || '');
              console.log('Created:', file.path);
            }

            if (!fileData.files || fileData.files.length === 0) {
              fs.mkdirSync('src/components', { recursive: true });
              fs.writeFileSync('src/components/App.tsx', '// Claude generated placeholder');
              console.log('Created placeholder');
            }

            // Git operations
            const branch = `feature/${jiraKey}-fe-${Date.now()}`;
            execSync('git config user.email "pipeline@github.com"');
            execSync('git config user.name "Pipeline Bot"');
            execSync(`git remote set-url origin https://x-access-token:${orgPat}@github.com/org-pipeline-sophie/org-pipeline-sophie-fe.git`);
            execSync(`git checkout -b ${branch}`);
            execSync('git add src/');
            execSync(`git commit -m "[FE] ${jiraKey}: Claude generated FE code"`);
            execSync(`git push origin ${branch}`);

            // Create PR
            const pr = await github.rest.pulls.create({
              owner: 'org-pipeline-sophie',
              repo: 'org-pipeline-sophie-fe',
              title: `[FE] ${jiraKey}: Auto-generated FE code`,
              body: `Claude auto-generated FE code for ${jiraKey}. Issue: #${process.env.ISSUE_NUMBER}\n\n### Summary\n${fileData.summary || 'N/A'}`,
              head: branch,
              base: 'main'
            });

            console.log('PR created:', pr.data.html_url);
            core.setOutput('fe_summary', fileData.summary || 'Claude generated FE code');
            core.setOutput('pr_url', pr.data.html_url);
            core.setOutput('branch', branch);

      - name: Create FE build result artifact
        run: |
          mkdir -p fe-result
          jq -n \
            --arg jira "${{ inputs.jira_issue_key }}" \
            --arg issue "${{ inputs.github_issue_number }}" \
            --arg be_run "${{ inputs.be_run_id }}" \
            --arg docs_run "${{ inputs.docs_run_id }}" \
            --arg fe_run "${{ github.run_id }}" \
            --arg fe_sha "${{ github.sha }}" \
            --arg summary "${{ steps.claude_fe.outputs.fe_summary }}" \
            --arg pr_url "${{ steps.claude_fe.outputs.pr_url }}" \
            --arg branch "${{ steps.claude_fe.outputs.branch }}" \
            '{"jira_issue_key":$jira,"github_issue_number":$issue,"be_run_id":$be_run,"docs_run_id":$docs_run,"fe_run_id":$fe_run,"fe_sha":$fe_sha,"status":"success","fe_summary":$summary,"pr_url":$pr_url,"branch":$branch}' \
            > fe-result/fe-summary.json
          cat fe-result/fe-summary.json

      - name: Upload FE artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-final-artifact
          path: fe-result/

      - name: Trigger BE receive-result workflow
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-be/actions/workflows/receive-fe-result.yml/dispatches \
            -d '{"ref":"main","inputs":{"fe_run_id":"${{ github.run_id }}","jira_issue_key":"${{ inputs.jira_issue_key }}","github_issue_number":"${{ inputs.github_issue_number }}","fe_sha":"${{ github.sha }}"}}')
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "Failed to trigger BE receive-result workflow"
            exit 1
          fi
          echo "Successfully triggered BE receive-fe-result workflow"
