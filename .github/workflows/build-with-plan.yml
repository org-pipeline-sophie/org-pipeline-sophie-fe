name: FE - Build with BE Artifact and Docs Plan and Send Result to BE

on:
  workflow_dispatch:
    inputs:
      be_run_id:
        description: 'BE workflow run ID'
        required: true
      docs_run_id:
        description: 'DOCS workflow run ID'
        required: true
      jira_issue_key:
        description: 'JIRA Issue Key'
        required: true
      github_issue_number:
        description: 'GitHub Issue Number'
        required: true

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FE repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_PAT }}

      - name: Download BE artifact
        uses: actions/download-artifact@v4
        with:
          name: be-artifact
          path: be-artifact/
          github-token: ${{ secrets.ORG_PAT }}
          repository: org-pipeline-sophie/org-pipeline-sophie-be
          run-id: ${{ inputs.be_run_id }}

      - name: Download DOCS artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-plan-artifact
          path: docs-plan/
          github-token: ${{ secrets.ORG_PAT }}
          repository: org-pipeline-sophie/org-pipeline-sophie-docs
          run-id: ${{ inputs.docs_run_id }}

      - name: Read artifacts
        run: |
          echo "=== BE Artifact ==="
          cat be-artifact/pipeline-context.json
          echo "=== DOCS Plan ==="
          cat docs-plan/plan-meta.json

      - name: Generate FE code with Claude
        id: claude_fe
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_KEY: ${{ inputs.jira_issue_key }}
        run: |
          PLAN=$(cat docs-plan/plan-meta.json)
          CONTEXT=$(cat be-artifact/pipeline-context.json)

          # Build request payload
          PROMPT="다음 개발 계획을 기반으로 React TypeScript FE 컴포넌트 코드를 생성해줘. JIRA Key: $JIRA_KEY. 개발 계획: $PLAN. 반드시 아래 JSON 형식으로만 응답해줘 (마크다운 없이 순수 JSON): {\"files\": [{\"path\": \"src/components/Example.tsx\", \"content\": \"// code\"}], \"summary\": \"요약\"}"

          python3 -c "
import json, urllib.request, os

with open('docs-plan/plan-meta.json') as f:
    plan = json.load(f)
with open('be-artifact/pipeline-context.json') as f:
    context = json.load(f)

jira_key = os.environ.get('JIRA_KEY', 'UNKNOWN')
api_key = os.environ.get('ANTHROPIC_API_KEY', '')

prompt = f'다음 개발 계획을 기반으로 React TypeScript FE 컴포넌트 코드를 생성해줘. JIRA Key: {jira_key}. 개발 계획: {json.dumps(plan, ensure_ascii=False)}. 반드시 아래 JSON 형식으로만 응답해줘 (마크다운 없이 순수 JSON): {chr(123)}\"files\": [{chr(123)}\"path\": \"src/components/LoginForm.tsx\", \"content\": \"// React component code here\"{chr(125)}], \"summary\": \"생성된 코드 요약\"{chr(125)}'

req_data = json.dumps({chr(123)}'model': 'claude-3-5-sonnet-20241022', 'max_tokens': 4096, 'messages': [{chr(123)}'role': 'user', 'content': prompt{chr(125)}]{chr(125)}).encode()
req = urllib.request.Request('https://api.anthropic.com/v1/messages', data=req_data, headers={'x-api-key': api_key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json'})

with urllib.request.urlopen(req) as resp:
    result = json.loads(resp.read())

text = result.get('content', [{}])[0].get('text', '{chr(123)}{chr(125)}')
print('Claude response:', text[:300])

try:
    data = json.loads(text)
except Exception:
    import re
    m = re.search(r'{chr(123)}.*{chr(125)}', text, re.DOTALL)
    data = json.loads(m.group()) if m else {chr(123)}'files': [], 'summary': 'parse failed'{chr(125)}

with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
    f.write(f\"fe_summary={data.get('summary', 'Claude generated FE code')}\\n\")

for fi in data.get('files', []):
    p = fi.get('path', '')
    c = fi.get('content', '')
    if p:
        os.makedirs(os.path.dirname(p) if os.path.dirname(p) else '.', exist_ok=True)
        with open(p, 'w') as f:
            f.write(c)
        print('Created:', p)
"

      - name: Create branch and PR
        run: |
          BRANCH="feature/${{ inputs.jira_issue_key }}-fe-$(date +%s)"
          git config user.email "pipeline@github.com"
          git config user.name "Pipeline Bot"
          git remote set-url origin https://x-access-token:${{ secrets.ORG_PAT }}@github.com/org-pipeline-sophie/org-pipeline-sophie-fe.git
          git checkout -b $BRANCH
          git add src/ 2>/dev/null || true
          git status
          if git diff --staged --quiet; then
            echo "No Claude files, creating placeholder"
            mkdir -p src
            echo "// Claude generated placeholder" > src/placeholder.ts
            git add src/placeholder.ts
          fi
          git commit -m "[FE] ${{ inputs.jira_issue_key }}: Claude generated FE code"
          git push origin $BRANCH
          echo "branch=$BRANCH" >> $GITHUB_ENV

          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-fe/pulls \
            -d "{\"title\": \"[FE] ${{ inputs.jira_issue_key }}: Auto-generated FE code\", \"body\": \"Claude auto-generated FE code for ${{ inputs.jira_issue_key }}\", \"head\": \"$BRANCH\", \"base\": \"main\"}")
          echo "PR Response: $PR_RESPONSE"
          PR_URL=$(echo $PR_RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('html_url', 'PR creation failed'))")
          echo "PR URL: $PR_URL"
          echo "pr_url=$PR_URL" >> $GITHUB_ENV

      - name: Create FE build result artifact
        run: |
          mkdir -p fe-result
          cat > fe-result/fe-summary.json << JSONEOF
          {
            "jira_issue_key": "${{ inputs.jira_issue_key }}",
            "github_issue_number": "${{ inputs.github_issue_number }}",
            "be_run_id": "${{ inputs.be_run_id }}",
            "docs_run_id": "${{ inputs.docs_run_id }}",
            "fe_run_id": "${{ github.run_id }}",
            "fe_sha": "${{ github.sha }}",
            "status": "success",
            "fe_summary": "${{ steps.claude_fe.outputs.fe_summary }}",
            "pr_url": "${{ env.pr_url }}",
            "branch": "${{ env.branch }}"
          }
          JSONEOF
          cat fe-result/fe-summary.json

      - name: Upload FE artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-final-artifact
          path: fe-result/

      - name: Trigger BE receive-result workflow
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-be/actions/workflows/receive-fe-result.yml/dispatches \
            -d '{"ref": "main", "inputs": {"fe_run_id": "${{ github.run_id }}", "jira_issue_key": "${{ inputs.jira_issue_key }}", "github_issue_number": "${{ inputs.github_issue_number }}", "fe_sha": "${{ github.sha }}"}}')
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "Failed to trigger BE receive-result workflow"
            exit 1
          fi
          echo "Successfully triggered BE receive-fe-result workflow"
