name: FE - Build with BE Artifact and Docs Plan and Send Result to BE

on:
  workflow_dispatch:
    inputs:
      be_run_id:
        description: 'BE workflow run ID'
        required: true
      docs_run_id:
        description: 'DOCS workflow run ID'
        required: true
      jira_issue_key:
        description: 'JIRA Issue Key'
        required: true
      github_issue_number:
        description: 'GitHub Issue Number'
        required: true

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FE repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_PAT }}

      - name: Download BE artifact
        uses: actions/download-artifact@v4
        with:
          name: be-artifact
          path: be-artifact/
          github-token: ${{ secrets.ORG_PAT }}
          repository: org-pipeline-sophie/org-pipeline-sophie-be
          run-id: ${{ inputs.be_run_id }}

      - name: Download DOCS artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-plan-artifact
          path: docs-plan/
          github-token: ${{ secrets.ORG_PAT }}
          repository: org-pipeline-sophie/org-pipeline-sophie-docs
          run-id: ${{ inputs.docs_run_id }}

      - name: Read artifacts
        run: |
          echo "=== BE Artifact ==="
          cat be-artifact/pipeline-context.json
          echo "=== DOCS Plan ==="
          cat docs-plan/plan-meta.json

      - name: Generate FE code with Claude
        id: claude_fe
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_KEY: ${{ inputs.jira_issue_key }}
        run: |
          SUMMARY=$(cat docs-plan/plan-meta.json | jq -r '.jira_summary // "FE development"')
          PLAN_TASKS=$(cat docs-plan/plan-meta.json | jq -r '.claude_plan.fe_tasks // [] | join(", ")')

          # Write Python script to file
          cat > /tmp/call_claude.py << 'SCRIPTEOF'
          import json, urllib.request, os, re, sys

          plan_file = sys.argv[1]
          jira_key = os.environ.get("JIRA_KEY", "UNKNOWN")
          api_key = os.environ.get("ANTHROPIC_API_KEY", "")

          with open(plan_file) as f:
              plan = json.load(f)

          fe_tasks = plan.get("claude_plan", {}).get("fe_tasks", [])
          summary = plan.get("jira_summary", "FE development")

          prompt = f"""다음 개발 계획을 기반으로 React TypeScript FE 컴포넌트 코드를 생성해줘.
JIRA Key: {jira_key}
기능 요약: {summary}
FE 태스크: {", ".join(fe_tasks)}

반드시 아래 JSON 형식으로만 응답해줘 (마크다운 없이 순수 JSON):
{{"files": [{{"path": "src/components/MainComponent.tsx", "content": "import React from 'react';\n\nconst MainComponent: React.FC = () => {{\n  return <div>Hello</div>;\n}};\n\nexport default MainComponent;"}}], "summary": "생성된 코드 요약"}}
"""

          payload = json.dumps({"model": "claude-3-5-sonnet-20241022", "max_tokens": 4096, "messages": [{"role": "user", "content": prompt}]}).encode()
          req = urllib.request.Request("https://api.anthropic.com/v1/messages", data=payload, headers={"x-api-key": api_key, "anthropic-version": "2023-06-01", "content-type": "application/json"})

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
              text = result.get("content", [{}])[0].get("text", "{}")
              print("Claude preview:", text[:200])
              try:
                  data = json.loads(text)
              except Exception:
                  m = re.search(r"\{[\s\S]*\}", text)
                  data = json.loads(m.group()) if m else {"files": [], "summary": "parse error"}
          except Exception as e:
              print(f"API error: {e}")
              data = {"files": [], "summary": "API error"}

          github_output = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          with open(github_output, "a") as f:
              f.write(f'fe_summary={data.get("summary", "Claude generated FE code")}\n')

          for fi in data.get("files", []):
              p = fi.get("path", "")
              c = fi.get("content", "")
              if p:
                  d = os.path.dirname(p)
                  if d:
                      os.makedirs(d, exist_ok=True)
                  with open(p, "w") as f:
                      f.write(c)
                  print("Created:", p)
          SCRIPTEOF

          python3 /tmp/call_claude.py docs-plan/plan-meta.json

      - name: Create branch and PR
        run: |
          BRANCH="feature/${{ inputs.jira_issue_key }}-fe-$(date +%s)"
          git config user.email "pipeline@github.com"
          git config user.name "Pipeline Bot"
          git remote set-url origin https://x-access-token:${{ secrets.ORG_PAT }}@github.com/org-pipeline-sophie/org-pipeline-sophie-fe.git
          git checkout -b $BRANCH
          git add src/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No Claude files, creating placeholder"
            mkdir -p src
            echo "// Claude generated placeholder" > src/placeholder.ts
            git add src/placeholder.ts
          fi
          git commit -m "[FE] ${{ inputs.jira_issue_key }}: Claude generated FE code"
          git push origin $BRANCH
          echo "branch=$BRANCH" >> $GITHUB_ENV

          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-fe/pulls \
            -d "{\"title\": \"[FE] ${{ inputs.jira_issue_key }}: Auto-generated FE code\", \"body\": \"Claude auto-generated FE code for ${{ inputs.jira_issue_key }}. Issue: #${{ inputs.github_issue_number }}\", \"head\": \"$BRANCH\", \"base\": \"main\"}")
          echo "PR Response: $PR_RESPONSE"
          PR_URL=$(echo $PR_RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('html_url', 'PR creation failed'))")
          echo "PR URL: $PR_URL"
          echo "pr_url=$PR_URL" >> $GITHUB_ENV

      - name: Create FE build result artifact
        run: |
          mkdir -p fe-result
          echo "{" > fe-result/fe-summary.json
          echo "  \"jira_issue_key\": \"${{ inputs.jira_issue_key }}\"," >> fe-result/fe-summary.json
          echo "  \"github_issue_number\": \"${{ inputs.github_issue_number }}\"," >> fe-result/fe-summary.json
          echo "  \"be_run_id\": \"${{ inputs.be_run_id }}\"," >> fe-result/fe-summary.json
          echo "  \"docs_run_id\": \"${{ inputs.docs_run_id }}\"," >> fe-result/fe-summary.json
          echo "  \"fe_run_id\": \"${{ github.run_id }}\"," >> fe-result/fe-summary.json
          echo "  \"fe_sha\": \"${{ github.sha }}\"," >> fe-result/fe-summary.json
          echo "  \"status\": \"success\"," >> fe-result/fe-summary.json
          echo "  \"pr_url\": \"${{ env.pr_url }}\"," >> fe-result/fe-summary.json
          echo "  \"branch\": \"${{ env.branch }}\"" >> fe-result/fe-summary.json
          echo "}" >> fe-result/fe-summary.json
          cat fe-result/fe-summary.json

      - name: Upload FE artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-final-artifact
          path: fe-result/

      - name: Trigger BE receive-result workflow
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.ORG_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/org-pipeline-sophie/org-pipeline-sophie-be/actions/workflows/receive-fe-result.yml/dispatches \
            -d '{"ref": "main", "inputs": {"fe_run_id": "${{ github.run_id }}", "jira_issue_key": "${{ inputs.jira_issue_key }}", "github_issue_number": "${{ inputs.github_issue_number }}", "fe_sha": "${{ github.sha }}"}}') 
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "Failed to trigger BE receive-result workflow"
            exit 1
          fi
          echo "Successfully triggered BE receive-fe-result workflow"
